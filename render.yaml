services:
  - type: web
    name: vex-api
    runtime: node
    rootDir: apps/api
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @vex/shared run build && pnpm --filter @vex/api run build
    startCommand: pnpm --filter @vex/api run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: READ_REPLICA_URLS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false

databases:
  - name: vex-postgres
    plan: starter
