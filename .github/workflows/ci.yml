name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "**.png"
      - "**.jpg"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: Turbo Gate (Build + Test + Ship)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vex
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vex"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node + pnpm + Turbo cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies (pnpm store cache)
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Install Playwright (Chromium) for web E2E
        run: pnpm --filter @vex/web exec playwright install --with-deps chromium

      - name: Turbo Remote Cache
        uses: turborepo/action@v2
        with:
          token: ${{ secrets.TURBO_TOKEN }}
          team: ${{ secrets.TURBO_TEAM }}

      - name: Run Turbo CI (affected-only + remote cache)
        run: pnpm -w turbo run build test:e2e ship:gate pilot:verify --filter=[HEAD^1] --concurrency=6
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vex
          DIRECT_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vex
          JWT_SECRET: ci-ship-gate-not-a-real-secret
          SKIP_VALUATION_ENV_CHECK: "true"

      - name: Upload coverage / artifacts (optional but fast)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: turbo-cache
          path: .turbo
          retention-days: 1
